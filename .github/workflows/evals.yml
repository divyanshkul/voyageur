name: evals

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline:
    name: offline suite (no API keys)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run offline evals
        run: python -m evals.run_evals --suite offline

      - name: Upload offline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-offline-${{ github.run_id }}
          path: evals/reports/
          if-no-files-found: ignore

  online:
    name: online suite (OpenAI-backed)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run when the secret is configured. Forks won't have it — skip cleanly.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: offline
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for OPENAI_API_KEY
        id: openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::OPENAI_API_KEY secret not set — skipping online suite."
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run online evals
        if: steps.openai.outputs.has_key == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m evals.run_evals --suite online

      - name: Upload online report
        if: always() && steps.openai.outputs.has_key == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: evals-online-${{ github.run_id }}
          path: evals/reports/
          if-no-files-found: ignore
